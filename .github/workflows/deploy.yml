name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/coffee-price
            git config --global --add safe.directory /var/www/coffee-price
            git pull origin main
            sudo -u coffee .venv/bin/pip install -r requirements.txt -q
            sudo -u coffee .venv/bin/python -m app.migrate
            systemctl restart coffee-price
            systemctl is-active coffee-price

<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Admin Stats</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <h1>Clickout Stats — {{ days }} วันล่าสุด</h1>
  <p><a href="?days=7">7 วัน</a> | <a href="?days=30">30 วัน</a> | <a href="?days=90">90 วัน</a></p>

  <table>
    <thead>
      <tr><th>สินค้า</th><th>หน้าต้นทาง</th><th>คลิก</th></tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.name_th }}</td>
        <td><code>{{ row.source_page }}</code></td>
        <td>{{ row.clicks }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3">ยังไม่มีข้อมูล</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>
